<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>DualWrite 录入助手</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 320px; font-family: "PingFang SC", "Segoe UI", system-ui, sans-serif; font-size: 14px; color: #333; background: #fff; }

    .header { background: linear-gradient(135deg, #ff4757, #ff6b81); color: #fff; padding: 16px 18px 14px; }
    .header h1 { font-size: 15px; font-weight: 700; }
    .header p  { font-size: 11px; opacity: 0.85; margin-top: 3px; }

    .stats { display: flex; border-bottom: 1px solid #f0f0f0; }
    .stat { flex: 1; text-align: center; padding: 12px 8px; border-right: 1px solid #f0f0f0; }
    .stat:last-child { border-right: none; }
    .stat .num { font-size: 22px; font-weight: 700; color: #ff4757; }
    .stat .lbl { font-size: 11px; color: #999; margin-top: 2px; }

    .section-title { font-size: 11px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 0.5px; padding: 12px 16px 6px; display: flex; justify-content: space-between; align-items: center; }
    .section-title button { font-size: 11px; background: none; border: 1px solid #eee; border-radius: 6px; padding: 2px 8px; cursor: pointer; color: #888; }

    /* 分类管理 */
    #cat-section { border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; }
    #cat-list { display: flex; flex-wrap: wrap; gap: 6px; padding: 6px 16px 8px; }
    .cat-tag-item { display: flex; align-items: center; gap: 3px; background: #fff0f1; color: #ff4757; border-radius: 20px; padding: 3px 10px 3px 12px; font-size: 12px; }
    .cat-tag-item .del { cursor: pointer; color: #ffaaaa; font-size: 14px; line-height: 1; }
    .cat-tag-item .del:hover { color: #ff4757; }
    .add-cat-row { display: flex; gap: 6px; padding: 0 16px 4px; }
    .add-cat-row input { flex: 1; padding: 6px 10px; border: 1px solid #eee; border-radius: 8px; font-size: 12px; outline: none; }
    .add-cat-row input:focus { border-color: #ff4757; }
    .add-cat-row button { background: #ff4757; color: #fff; border: none; border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; white-space: nowrap; }

    /* 待导入列表 */
    #pending-list { max-height: 180px; overflow-y: auto; }
    .pending-item { padding: 8px 16px; border-bottom: 1px solid #f5f5f5; display: flex; gap: 8px; align-items: flex-start; }
    .pending-item .cat-badge { font-size: 10px; background: #fff0f1; color: #ff4757; border-radius: 4px; padding: 2px 6px; white-space: nowrap; flex-shrink: 0; margin-top: 1px; }
    .pending-item .txt { font-size: 12px; color: #555; line-height: 1.5; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .empty-hint { text-align: center; color: #bbb; font-size: 12px; padding: 24px 16px; line-height: 1.8; }

    /* 操作按钮 */
    .actions { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; border-top: 1px solid #f0f0f0; }
    .btn-primary { background: #ff4757; color: #fff; border: none; border-radius: 10px; padding: 11px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; transition: opacity 0.2s; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.4; cursor: default; }
    .btn-ghost { background: #f5f5f5; color: #555; border: none; border-radius: 10px; padding: 9px; font-size: 13px; cursor: pointer; width: 100%; transition: opacity 0.2s; }
    .btn-ghost:hover { opacity: 0.8; }

    #copy-code-area { display: none; padding: 0 16px 12px; }
    #copy-code-area p { font-size: 11px; color: #999; margin-bottom: 6px; line-height: 1.6; }
    #import-code { width: 100%; font-size: 11px; font-family: monospace; padding: 8px; border: 1px solid #eee; border-radius: 8px; background: #fafafa; color: #333; resize: none; height: 72px; }
    .btn-copy { margin-top: 6px; background: #5c6bc0; color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 12px; cursor: pointer; width: 100%; font-weight: 600; }

    #toast { display: none; text-align: center; font-size: 12px; color: #4caf50; padding: 4px 16px 8px; font-weight: 600; }
  </style>
</head>
<body>

<div class="header">
  <h1>📥 评论录入助手</h1>
  <p>在小红书划选评论文字，点按钮即可录入</p>
</div>

<div class="stats">
  <div class="stat"><div class="num" id="stat-total">0</div><div class="lbl">待导入</div></div>
  <div class="stat"><div class="num" id="stat-today">0</div><div class="lbl">今日录入</div></div>
  <div class="stat"><div class="num" id="stat-total-ever">0</div><div class="lbl">累计录入</div></div>
</div>

<!-- 分类管理 -->
<div id="cat-section">
  <div class="section-title">
    <span>我的分类</span>
  </div>
  <div id="cat-list"></div>
  <div class="add-cat-row">
    <input id="new-cat-input" type="text" placeholder="输入分类名，回车添加" maxlength="20" />
    <button id="btn-add-cat">+ 添加</button>
  </div>
</div>

<!-- 待导入列表 -->
<div class="section-title">待导入评论</div>
<div id="pending-list">
  <div class="empty-hint">暂无待导入的评论<br>去小红书划选文字试试吧 ✨</div>
</div>

<div id="toast"></div>

<div class="actions">
  <button class="btn-primary" id="btn-export" disabled>📤 生成导入代码</button>
  <button class="btn-ghost" id="btn-clear">🗑 清空待导入列表</button>
</div>

<div id="copy-code-area">
  <p>复制代码 → 打开工作站 → 按 F12 → 粘贴进控制台 → 回车 → 刷新页面</p>
  <textarea id="import-code" readonly></textarea>
  <button class="btn-copy" id="btn-copy-code">📋 一键复制代码</button>
</div>

<script src="popup.js"></script>
</body>
</html>
